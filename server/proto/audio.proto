syntax = "proto3";

package audio;

service AudioService {
  rpc StreamAudio (stream AudioChunk) returns (stream TranscriptionChunk);
}

message AudioChunk {
  bytes  pcm_data    = 1;
  int32  sample_rate = 2;
  int32  channels    = 3;
  int32  bit_depth   = 4;
}

message TranscriptionChunk {
  string text = 1;
}
